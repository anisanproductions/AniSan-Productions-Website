<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poems</title>

    <style>
        body {
            margin: 0;
            background-image: url("background.jpg");
            color: white;
            font-family: 'Baskerville Old Face', serif;
        }

        header {
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .poem {
            margin: 40px;
        }

        .poem-title {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .poem-name {
            font-size: 1.4em;
        }

        .poem-text {
            margin-left: 20px;
            line-height: 0.7;
        }

        .poem-date {
            opacity: 0.7;
        }

        .type {
            font-style: italic;
        }

        
          a:link {
            color: rgb(255, 255, 255);
        }


        a:visited {
            color: rgb(255, 255, 255);
        }


        a:hover {
            color: rgb(255, 255, 255);
        }


        a:active {
            color: rgb(174, 174, 174);
        }

        .extra-links {
            font-size: 0.8em;
        }

    </style>
</head>

<body>

    <header>
        <h1>Zephyr Parahoy's Poetry</h1>
    </header>

    <section class="poem">
        <div class="poem-title">
            <strong>[2]</strong> <span class="poem-date">4.3.26</span> —
            <span class="poem-name" style="font-style: italic;">__</span>  <a class= extra_links href="https://www.napowrimo.net/">[NPWM]</a>
        </div>

        <div class="poem-text">
            <p>_</p>
            <p>_</p>
            <p>_</p>
        </div>
    </section>

    <section class="poem">
        <div class="poem-title">
            <strong>[1]</strong> <span class="poem-date">4.1.26</span> —
            <span class="poem-name" style="font-style: italic;">haiku -1</span>  <a class= extra_links href="https://www.napowrimo.net/">[NPWM]</a>
        </div>

        <div class="poem-text">
            <p>I turned around</p>
            <p>I saw the broken paths</p>
            <p>I shut my eyes</p>
        </div>
    </section>

</body>
</html>
